# Renate — dev stack.
# `bot` is ephemeral (one container per Meet session, spawned by `worker`
# via the Docker socket). It is built here but intentionally not started
# by `docker compose up`.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-renate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-renate}
      POSTGRES_DB: ${POSTGRES_DB:-renate}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-renate}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [renate]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [renate]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [renate]

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      API_PORT: ${API_PORT:-3000}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [renate]

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Host-side path to ./auth so the worker can bind-mount the right
      # auth.json into each bot container it spawns.
      AUTH_HOST_PATH: ${PWD}/auth
    # Docker socket is mounted so the worker can `docker run` per-session
    # bot containers.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    networks: [renate]

  diarize:
    build:
      context: ./diarize
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DIARIZE_PORT: ${DIARIZE_PORT:-8000}
    ports:
      - "${DIARIZE_PORT:-8000}:8000"
    volumes:
      - diarize-cache:/root/.cache
    networks: [renate]

  # Ephemeral — not started by `up`. Built so the worker can spawn it per
  # session. For local dev against a real Meet URL:
  #
  #   docker compose --profile bot run --rm \
  #     -e SESSION_ID=dev \
  #     -e MEET_URL=https://meet.google.com/xxx-xxxx-xxx \
  #     bot
  #
  # Requires ./auth/auth.json (produced by `cd bot && npm run generate-auth`).
  bot:
    profiles: ["bot"]
    build:
      context: .
      dockerfile: bot/Dockerfile
    image: renate-bot:latest
    env_file: .env
    volumes:
      - ./auth:/auth:ro
    networks: [renate]

volumes:
  pg-data:
  minio-data:
  diarize-cache:

networks:
  renate:
    driver: bridge
